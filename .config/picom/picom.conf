# ┌─┐┬┌─┐┌─┐┌┬┐
# ├─┘││  │ ││││
# ┴  ┴└─┘└─┘┴ ┴

#############
# Fading
#############

fading = false;
fade-delta = 3;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [ ];

#############
# Backend
#############

backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;
unredir-if-possible = true;
vsync = false;
dbe = false;
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];
glx-copy-from-front = false;
use-damage=true;

#############
# Wintypes
#############

wintypes : 
{
  tooltip : 
  {
    fade = true;
    shadow = false;
    opacity = 0.85;
    focus = true;
  };
  fullscreen : 
  {
    fade = true;
    shadow = false;
    opacity = 1;
    focus = true;
  };
};

#################################
#             Corners           #
#################################

corner-radius = 7;
round-borders = 1;
round-borders-exclude = [];

#################################
#             Shadows           #
#################################
#
 shadow = true;
 shadow-radius        = 16;
 shadow-offset-x      = -14;
 shadow-offset-y      = -14;
 shadow-opacity       = 0.25;

# shadow-exclude = [
#  "name = 'Notification'",
#  "class_g = 'Polybar'"	
#];


#################################
#             Blur              #
#################################

opacity-rule = [
    "90:class_g = 'kitty'",
    "90:class_g = 'discord'",
    "80:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];
blur: {
    method = "dual_kawase";
    strength = 3;
    background = false;
    background-frame = false;
    background-fixed = false;
    kern = "3x3box";
}
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_OPACITY@:c < 0x99"
];
