opacity-rule = [
    "90:class_g = 'kitty'"
];

blur:
{
    method = "dual_kawase";
    strength = 4;
    size = 30;
}

backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c"
];

